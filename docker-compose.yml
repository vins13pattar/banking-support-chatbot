services:
  postgres:
    image: postgres:16-alpine
    container_name: banking-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: banking-chatbot-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bankingchatbot.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network

  admin-dashboard:
    image: node:20-alpine
    container_name: banking-chatbot-admin
    working_dir: /app
    volumes:
      - ./frontend/admin-dashboard:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPPORT_API_URL=http://localhost:8000/api/v1
    networks:
      - chatbot-network

  fastapi-backend:
    image: python:3.12-slim
    container_name: banking-chatbot-fastapi
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -e . && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/banking_chatbot
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network

  customer-chat:
    image: node:20-alpine
    container_name: banking-chatbot-customer
    working_dir: /app
    volumes:
      - ./frontend/customer-chat:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    networks:
      - chatbot-network


volumes:
  postgres-data:
    driver: local

networks:
  chatbot-network:
    driver: bridge
