services:
  postgres:
    image: postgres:16-alpine
    container_name: banking-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: banking-chatbot-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bankingchatbot.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network

  admin-dashboard:
    image: node:20-alpine
    container_name: banking-chatbot-admin
    working_dir: /app
    volumes:
      - ./frontend/admin-dashboard:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPPORT_API_URL=http://localhost:8000/api/v1
    networks:
      - chatbot-network

  fastapi-backend:
    image: python:3.12-slim
    container_name: banking-chatbot-fastapi
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -e . && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/banking_chatbot
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network

  customer-chat:
    image: node:20-alpine
    container_name: banking-chatbot-customer
    working_dir: /app
    volumes:
      - ./frontend/customer-chat:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    networks:
      - chatbot-network

  # --- LangGraph self-hosted server: Postgres-backed thread/checkpoint persistence ---
  # Replaces `langgraph dev` (ephemeral in-memory pickle store) so conversation
  # threads persist in Postgres via the server's built-in PostgresSaver.
  langgraph-redis:
    image: redis:6
    container_name: banking-chatbot-langgraph-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 1s
      retries: 5
    networks:
      - chatbot-network

  # Dedicated Postgres for langgraph threads/checkpoints/store. Uses the pgvector
  # image (the server's store schema requires the `vector` extension); kept
  # separate from the app's `postgres` DB so business data and agent runtime
  # state don't share a schema. Exposed on host 5433 to avoid clashing with 5432.
  langgraph-postgres:
    image: pgvector/pgvector:pg16
    container_name: banking-chatbot-langgraph-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: ["postgres", "-c", "shared_preload_libraries=vector"]
    ports:
      - "5433:5432"
    volumes:
      - langgraph-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  langgraph-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.langgraph
    container_name: banking-chatbot-langgraph-api
    restart: unless-stopped
    ports:
      - "2024:8000"
    env_file:
      - .env
    environment:
      # Thread/checkpoint persistence — the langgraph server reads these directly.
      REDIS_URI: redis://langgraph-redis:6379
      POSTGRES_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
      # The graph's own domain DB (customers/accounts/transactions). Reach the app
      # Postgres by its compose service name — `localhost` would resolve to this
      # container, not the host. Overrides DATABASE_URL from .env (which targets localhost).
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/banking_chatbot
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python /api/healthcheck.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - chatbot-network


volumes:
  postgres-data:
    driver: local
  langgraph-postgres-data:
    driver: local

networks:
  chatbot-network:
    driver: bridge
